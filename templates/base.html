<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Invitación{% endblock %}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="{% block meta_description %}Te invito a celebrar conmigo este día tan especial.{% endblock %}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS Variables Injected from Backend -->
    {% block custom_styles %}
    <style>
        :root {
            --primary-color: {{ invitation.custom_primary_color|default:"#000" }};
            --secondary-color: {{ invitation.custom_secondary_color|default:"#fff" }};
            --text-color: #333333;
            --bg-color: #fafafa;
        }
    </style>
    {% endblock %}

    <!-- Global Styles -->
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }
        h1, h2, h3, .elegant-font {
            font-family: 'Playfair Display', serif;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--secondary-color);
            border-radius: 50px;
            padding: 10px 30px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background-color: var(--primary-color);
            opacity: 0.9;
        }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Microinteractions */
        .hover-lift { transition: transform 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    
    <!-- Audio Player (hidden) -->
    {% if invitation.show_music and invitation.music_url %}
    <audio id="bgMusic" loop autoplay>
        <source src="{{ invitation.music_url }}" type="audio/mpeg">
    </audio>
    <!-- Mute/Unmute button -->
    <button id="musicToggle" class="btn btn-light position-fixed bottom-0 end-0 m-4 rounded-circle shadow" style="z-index: 1050; width: 50px; height: 50px;">
        <i class="bi bi-volume-up-fill" id="musicIcon"></i>
    </button>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize Animate On Scroll
        AOS.init({
            duration: 1000,
            once: true, // whether animation should happen only once - while scrolling down
            offset: 100
        });
        
        // Music Toggle Logic
        const musicToggle = document.getElementById('musicToggle');
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        
        if(musicToggle && bgMusic) {
            musicToggle.addEventListener('click', () => {
                if(bgMusic.paused) {
                    bgMusic.play();
                    musicIcon.classList.remove('bi-volume-mute-fill');
                    musicIcon.classList.add('bi-volume-up-fill');
                } else {
                    bgMusic.pause();
                    musicIcon.classList.remove('bi-volume-up-fill');
                    musicIcon.classList.add('bi-volume-mute-fill');
                }
            });
            
            // Auto play policy workaround (user interaction required)
            document.body.addEventListener('click', function() {
                if(bgMusic.paused && !musicToggle.classList.contains('user-paused')) {
                    bgMusic.play().catch(e => console.log('Autoplay blocked'));
                }
            }, {once: true});
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>

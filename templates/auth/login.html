{% extends "base.html" %}

{% block title %}Acceso a Clientes | Invitación Digital{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle display-4 text-primary mb-3"></i>
                        <h2 class="h4 fw-bold">Portal de Clientes</h2>
                        <p class="text-muted small">Ingresa tus credenciales para administrar tus invitaciones.</p>
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuario o contraseña incorrectos.
                        </div>
                    {% endif %}

                    <form method="post" action="{% url 'portal:login' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label text-secondary small fw-bold">USUARIO</label>
                            <input type="text" name="username" class="form-control bg-light border-0 py-2" id="id_username" required autofocus>
                        </div>
                        
                        <div class="mb-4">
                            <label for="id_password" class="form-label text-secondary small fw-bold">CONTRASEÑA</label>
                            <input type="password" name="password" class="form-control bg-light border-0 py-2" id="id_password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3 fw-bold">Iniciar Sesión</button>
                        <input type="hidden" name="next" value="{{ next|default:'/portal/' }}">
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
